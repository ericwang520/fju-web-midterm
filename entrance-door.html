<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>玄關門系列 - 國堡門</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- Navigation -->
  <div class="nav-overlay" onclick="toggleMenu()"></div>
  <nav class="navbar visible">
    <button class="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-left">
      <a href="index.html" class="nav-link">首頁</a>
      <a href="about.html" class="nav-link">品牌介紹</a>
      <a href="entrance-door.html" class="nav-link">玄關門系列</a>
      <a href="door-flower.html" class="nav-link">門花系列</a>
      <a href="door-lock.html" class="nav-link">門鎖系列</a>
      <a href="cases.html" class="nav-link">案例分享</a>
      <a href="contact.html" class="nav-link">聯繫我們</a>
    </div>
  </nav>

  <!-- Product Hero -->
  <section class="product-hero" style="background-image: url('data/entrance-door/bannar.jpg');">
    <span class="product-hero-sub">產品系列</span>
    <h1>玄關門系列</h1>
    <p>氣派大方的玄關門，為您的居家打造完美第一印象</p>
  </section>

  <!-- Podium: Top 3 -->
  <section class="podium-section">
    <h2 class="section-title">熱銷排行</h2>
    <p class="podium-tagline">全台 8% 市占率・累計銷售超過 5 萬扇</p>
    <div class="podium-grid" id="podiumGrid"></div>
  </section>

  <!-- Product Gallery (auto-loaded from JSON) -->
  <section class="product-gallery">
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>

  <!-- Detail Modal -->
  <div class="detail-modal" id="detailModal">
    <div class="detail-modal-backdrop" onclick="closeDetailModal()"></div>
    <div class="detail-modal-content">
      <button class="detail-modal-close" onclick="closeDetailModal()">&times;</button>
      <div class="detail-modal-header">
        <img class="detail-modal-img" src="" alt="">
        <div class="detail-modal-info">
          <h2 class="detail-modal-name"></h2>
          <div class="detail-modal-style"></div>
        </div>
      </div>
      <div class="detail-modal-body">
        <div class="detail-modal-section detail-modal-features">
          <h3>特色</h3>
          <p></p>
        </div>
        <div class="detail-modal-section detail-modal-locks">
          <h3>門鎖</h3>
          <p></p>
        </div>
        <div class="detail-modal-section detail-modal-pricing">
          <h3>規格與價格</h3>
          <div class="detail-modal-table-wrap">
            <table class="detail-modal-table">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
        <div class="detail-modal-section detail-modal-notes">
          <ul></ul>
        </div>
        <div class="detail-modal-section detail-modal-desc">
          <div class="detail-modal-md"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allProducts = [];

    fetch('data/entrance-door/products.json')
      .then(r => r.json())
      .then(products => {
        allProducts = products;

        // Podium: top 3 in order silver(1) - gold(0) - bronze(2)
        const podiumOrder = [1, 0, 2];
        const ranks = ['gold','silver','bronze'];
        const nums = [2.3, 1.8, 1.2];
        const dispNums = [23000, 18000, 12000];
        const podiumGrid = document.getElementById('podiumGrid');

        podiumOrder.forEach(origIdx => {
          const p = products[origIdx];
          const rank = ranks[origIdx];
          const card = document.createElement('div');
          card.className = 'podium-card podium-' + rank;
          card.style.cursor = 'pointer';
          card.innerHTML = '<div class="podium-img"><img src="' + p.img + '" alt="' + p.name + '"></div>'
            + '<h3>' + p.name + '</h3>'
          var standContent = origIdx === 0
            ? '<span class="podium-stand-label">年銷</span><span class="podium-stand-num">' + dispNums[origIdx] + '+</span>'
            : '<span class="podium-stand-label">熱銷</span><span class="podium-stand-num">No.' + (origIdx + 1) + '</span>';
          card.innerHTML += '<div class="podium-stand podium-stand-' + rank + '" style="height:' + (nums[origIdx] / 2.3 * 140) + 'px">' + standContent + '</div>';
          card.addEventListener('click', () => openDetailModal(origIdx));
          podiumGrid.appendChild(card);
        });

        // Rest of products
        const grid = document.getElementById('galleryGrid');
        products.forEach((p, i) => {
          if (i < 3) return;
          const item = document.createElement('div');
          item.className = 'gallery-item';
          item.style.cursor = 'pointer';
          item.innerHTML = '<div class="gallery-img"><img src="' + p.img + '" alt="' + p.name + '"></div><h3>' + p.name + '</h3>';
          item.addEventListener('click', () => openDetailModal(i));
          grid.appendChild(item);
        });
      });

    function openDetailModal(idx) {
      const p = allProducts[idx];
      const d = p.detail || {};
      const modal = document.getElementById('detailModal');

      modal.querySelector('.detail-modal-img').src = p.img;
      modal.querySelector('.detail-modal-img').alt = p.name;
      modal.querySelector('.detail-modal-name').textContent = p.name;

      const styleEl = modal.querySelector('.detail-modal-style');
      styleEl.innerHTML = d.style ? d.style.replace(/\n/g, '<br>') : '';
      styleEl.style.display = d.style ? '' : 'none';

      const featSection = modal.querySelector('.detail-modal-features');
      if (d.features) {
        featSection.style.display = '';
        featSection.querySelector('p').innerHTML = d.features.replace(/\n/g, '<br>');
      } else {
        featSection.style.display = 'none';
      }

      const lockSection = modal.querySelector('.detail-modal-locks');
      if (d.locks) {
        lockSection.style.display = '';
        lockSection.querySelector('p').innerHTML = d.locks.replace(/\n/g, '<br>');
      } else {
        lockSection.style.display = 'none';
      }

      const pricingSection = modal.querySelector('.detail-modal-pricing');
      if (d.tableHead && d.tableBody) {
        pricingSection.style.display = '';
        modal.querySelector('.detail-modal-table thead').innerHTML = '<tr>' + d.tableHead.map(h => '<th>' + h + '</th>').join('') + '</tr>';
        modal.querySelector('.detail-modal-table tbody').innerHTML = d.tableBody.map(row => '<tr>' + row.map(c => '<td>' + c + '</td>').join('') + '</tr>').join('');
      } else {
        pricingSection.style.display = 'none';
      }

      const notesSection = modal.querySelector('.detail-modal-notes');
      if (d.notes && d.notes.length) {
        notesSection.style.display = '';
        notesSection.querySelector('ul').innerHTML = d.notes.map(n => '<li>' + n + '</li>').join('');
      } else {
        notesSection.style.display = 'none';
      }

      const descSection = modal.querySelector('.detail-modal-desc');
      if (d.description) {
        descSection.style.display = '';
        descSection.querySelector('.detail-modal-md').innerHTML = typeof marked !== 'undefined' ? marked.parse(d.description) : d.description;
      } else {
        descSection.style.display = 'none';
      }

      // Hide body if all sections are hidden
      const bodyEl = modal.querySelector('.detail-modal-body');
      const allHidden = Array.from(bodyEl.querySelectorAll('.detail-modal-section')).every(s => s.style.display === 'none');
      bodyEl.style.display = allHidden ? 'none' : '';

      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('show');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeDetailModal();
    });
  </script>

  <!-- Other Series -->
  <section class="other-series">
    <h2 class="section-title">其他系列</h2>
    <div class="other-series-grid">
      <a href="door-flower.html" class="other-series-card">
        <img src="assets/type/1.jpg" alt="門花系列">
        <span>門花系列</span>
      </a>
      <a href="door-lock.html" class="other-series-card">
        <img src="assets/type/3.jpg" alt="門鎖系列">
        <span>門鎖系列</span>
      </a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-bottom">
      <div class="footer-left">
        <h4>國堡門</h4>
        <p>門，是家的第一道防線、是玄關的一抹藝術，是主人的氣度與品味</p>
        <span class="footer-copy">&copy; 2026 國堡門. All rights reserved.</span>
      </div>
      <div class="footer-right">
        <a href="index.html">首頁</a>
        <a href="about.html">品牌介紹</a>
        <a href="door-flower.html">門花系列</a>
        <a href="entrance-door.html">玄關門系列</a>
        <a href="door-lock.html">門鎖系列</a>
      </div>
    </div>
  </footer>

  <script src="nav.js"></script>

  <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <script>
    const btt = document.querySelector('.back-to-top');
    window.addEventListener('scroll', () => {
      btt.classList.toggle('show', window.scrollY > 300);
    });
  </script>

</body>
</html>
